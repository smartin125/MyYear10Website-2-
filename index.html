<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Sam's 10DGT Website</title>
    <link rel="icon" type="image/png" href="Images/SSquare.png"/>
</head>
<!-- This is the main body of the website- ALL your content goes AFTER the <body> tag and before the </body> tag -->
<body>

    <!-- The Hero Section -------------------------------------------------------------------------------------- -->
    <section class="hero">
        <div class="hero-text">Sam's 10DGT Website</div>
    </section>

<!-- Topic one ------------------------------------------------------------------------------------------------- -->
    <!-- The First Topic Section -->
    <section class="topic">
        <!-- the topic title a big bar with text in it -->
        <div class="topic-title">
            <h1>Image Editing</h1>
        </div>
        <!-- now a three column grid of images -->
        <div class="topic-content">
            <!-- one "card" which includes an image with a text below it -->
            <div class="topic-card">
                <img src="Images/Background_taskv3.png" alt="Lake image">
                <h2 class="topic-card-text">Lake</h2>
            </div>
            <div class="topic-card">
                <img src="Images/Bear.png" alt="Bear image">
                <h2 class="topic-card-text">Bear</h2>
            </div>
            <div class="topic-card">
                <img src="Images/Parrotdistort.png" alt="Parrot image">
                <h2 class="topic-card-text">Parrot</h2>
            </div>
        </div>
    </section>
<!-- End of topic one------------------------------------------------------------------------------------------ -->

<!-- Copy and paste the section from above to make your next section -->



    <!-- A Simple Website Footer ------------------------------------------------------------------------------ -->
    <footer class="footer">
        <p>&copy; 2026 10DGT Showcase Website By Samuel Martin</p>
    </footer>

<!-- The end of the whole page- no more content after this! -->
</body>
</html>
